<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="View your past AI mock interview sessions — scores, feedback, and performance history."/>
  <title>InterviewAI — History</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <nav>
    <div class="nav-logo"><div class="nav-logo-icon">🤖</div>InterviewAI</div>
    <div class="nav-right">
      <button class="btn-retake" onclick="clearHistory()">🗑️ Clear History</button>
      <button class="btn-retake" onclick="window.location.href='index.html'">← Back</button>
    </div>
  </nav>

  <div class="main">
    <div class="section-title">📋 Interview History</div>

    <div id="historyList"></div>

    <div id="emptyState" class="history-empty" style="display:none">
      <div class="empty-icon">📭</div>
      <h3>No interviews yet!</h3>
      <p>Complete your first interview to see history here.</p>
      <button class="btn-retry" style="width:auto; padding:12px 32px;" onclick="window.location.href='index.html'">Start Interview →</button>
    </div>
  </div>

  <script src="js/history.js"></script>
</body>
</html>
